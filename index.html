<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREY-Games</title>
    <style>
        /* Reset i podstawowe style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #fff;
            text-align: center;
        }

        header {
            padding: 20px;
            background-color: #333;
        }

        header h1 {
            font-size: 2.5rem;
            color: #eee;
        }

        .games-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
        }

        .game {
            background-color: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            width: 200px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .game img {
            width: 100%;
            display: block;
        }

        .game-name {
            padding: 10px;
            font-size: 1.1rem;
            background-color: #222;
        }

        .download-btn {
            display: block;
            margin: 10px auto 15px;
            padding: 8px 15px;
            background-color: #555;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #777;
        }

        footer {
            padding: 20px;
            background-color: #333;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>GREY-Games</h1>
    </header>

    <div class="games-container">
        <!-- Przykładowa gra 1 -->
        <div class="game">
            <img src="gra1.jpg" alt="Gra RPG Maker 1">
            <div class="game-name">Gra RPG 1</div>
            <a href="gra1.zip" class="download-btn">Pobierz</a>
        </div>

        <!-- Przykładowa gra 2 -->
        <div class="game">
            <img src="gra2.jpg" alt="Gra RPG Maker 2">
            <div class="game-name">Gra RPG 2</div>
            <a href="gra2.zip" class="download-btn">Pobierz</a>
        </div>

        <!-- Przykładowa gra 3 -->
        <div class="game">
            <img src="gra3.jpg" alt="Gra RPG Maker 3">
            <div class="game-name">Gra RPG 3</div>
            <a href="gra3.zip" class="download-btn">Pobierz</a>
        </div>
    </div>

    <footer>
        &copy; 2026 GREY-Games. Wszelkie prawa zastrzeżone.
    </footer>
</body>
</html>
